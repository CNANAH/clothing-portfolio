<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作品集 — 服装作品展示</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <span class="nav-brand">PORTFOLIO</span>
      <span class="nav-desc">服装作品集</span>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-text">
      <p class="hero-eyebrow">CLOTHING · EDITORIAL</p>
      <h1 class="hero-title">作 品 集</h1>
      <p class="hero-sub">每一针一线，皆为肌肤之礼</p>
      <div class="hero-line"></div>
    </div>
  </header>

  <main class="main-content">

    <!-- 美肤衣 -->
    <section class="product-section" id="mfy">
      <div class="product-header">
        <span class="product-num">01</span>
        <h2 class="product-name">美肤衣</h2>
        <p class="product-desc">亲肤柔滑，宛若第二层肌肤</p>
      </div>
      <div class="gallery gallery-mfy">
        <div class="gallery-item item-main"><img src="images/mfy1.png" alt="美肤衣展示一" loading="lazy"></div>
        <div class="gallery-item item-right"><img src="images/mfy2.png" alt="美肤衣展示二" loading="lazy"></div>
        <div class="gallery-item item-wide"><img src="images/mfy3.png" alt="美肤衣展示三" loading="lazy"></div>
      </div>
      <div class="product-link">
        <a href="https://pan.baidu.com/s/1rtr0ioDqDZYOX4ZeiTYjTw?pwd=4ivm" target="_blank" rel="noopener" class="link-btn">
          <span class="link-icon">&#9654;</span>
          <span>查看完整作品</span>
          <span class="link-pwd">提取码: 4ivm</span>
        </a>
      </div>
    </section>

    <!-- 保暖背心 -->
    <section class="product-section" id="bnbx">
      <div class="product-header">
        <span class="product-num">02</span>
        <h2 class="product-name">保暖背心</h2>
        <p class="product-desc">温暖守护，冬日的柔软拥抱</p>
      </div>
      <div class="gallery gallery-bnbx">
        <div class="gallery-item item-wide"><img src="images/bnbx1.png" alt="保暖背心展示一" loading="lazy"></div>
        <div class="gallery-item item-tall"><img src="images/bnbx2.png" alt="保暖背心展示二" loading="lazy"></div>
        <div class="gallery-item item-main"><img src="images/bnbx3.png" alt="保暖背心展示三" loading="lazy"></div>
      </div>
      <div class="product-link">
        <a href="https://pan.baidu.com/s/1qKK17jDx0ShZsCPVzrYqYQ?pwd=8ri5" target="_blank" rel="noopener" class="link-btn">
          <span class="link-icon">&#9654;</span>
          <span>查看完整作品</span>
          <span class="link-pwd">提取码: 8ri5</span>
        </a>
      </div>
    </section>

    <!-- 收腹裤 -->
    <section class="product-section" id="sfk">
      <div class="product-header">
        <span class="product-num">03</span>
        <h2 class="product-name">收腹裤</h2>
        <p class="product-desc">塑形修身，自信线条由此开始</p>
      </div>
      <div class="gallery gallery-sfk">
        <div class="gallery-item item-tall"><img src="images/sfk1.png" alt="收腹裤展示一" loading="lazy"></div>
        <div class="gallery-item item-main"><img src="images/sfk2.png" alt="收腹裤展示二" loading="lazy"></div>
        <div class="gallery-item item-wide"><img src="images/sfk3.png" alt="收腹裤展示三" loading="lazy"></div>
      </div>
      <div class="product-link">
        <a href="https://pan.baidu.com/s/189o2MTepi3Gc9KObshLvlg?pwd=4u9n" target="_blank" rel="noopener" class="link-btn">
          <span class="link-icon">&#9654;</span>
          <span>查看完整作品</span>
          <span class="link-pwd">提取码: 4u9n</span>
        </a>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-line"></div>
    <p>© 2025 Portfolio · 服装作品集</p>
    <p class="footer-note">如需了解更多作品，欢迎联系</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
